    <rect x="1024" y="126" width="82" height="94" rx="24" fill="#0F172A"/>
    <text x="1040" y="166" fill="white" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="900">Watch</text>
