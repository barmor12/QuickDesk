<svg width="1180" height="360" viewBox="0 0 1180 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">QuickDesk connection flow</title>
  <desc id="desc">QuickDesk connects developer tools to the local agent, then to iPhone and Apple Watch.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#20D7C1"/>
      <stop offset="1" stop-color="#7077FF"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1180" height="360" rx="30" fill="#F7FAFC"/>
  <g filter="url(#s)">
    <rect x="54" y="88" width="210" height="162" rx="26" fill="white"/>
    <rect x="84" y="118" width="150" height="36" rx="10" fill="#EDF2F7"/>
    <text x="102" y="142" fill="#111827" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="900">Claude Code</text>
    <rect x="84" y="168" width="150" height="36" rx="10" fill="#EDF2F7"/>
    <text x="118" y="192" fill="#111827" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="900">Codex</text>
    <text x="95" y="230" fill="#64748B" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13">Permission hooks</text>
  </g>
  <path d="M284 169H396" stroke="url(#g)" stroke-width="6" stroke-linecap="round"/>
  <path d="M382 154L400 169L382 184" stroke="url(#g)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <g filter="url(#s)">
    <rect x="420" y="68" width="250" height="202" rx="30" fill="#0F172A"/>
    <circle cx="462" cy="112" r="18" fill="url(#g)"/>
    <text x="494" y="118" fill="white" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="900">Mac Agent</text>
    <text x="456" y="158" fill="#CBD5E1" font-family="SFMono-Regular, Menlo, monospace" font-size="14">localhost:7420</text>
    <text x="456" y="188" fill="#CBD5E1" font-family="SFMono-Regular, Menlo, monospace" font-size="14">Bonjour + Tailscale</text>
    <rect x="456" y="214" width="178" height="34" rx="12" fill="#1E293B"/>
    <text x="486" y="237" fill="#20D7C1" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="900">Tasks + approvals</text>
  </g>
  <path d="M692 169H804" stroke="url(#g)" stroke-width="6" stroke-linecap="round"/>
  <path d="M790 154L808 169L790 184" stroke="url(#g)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <g filter="url(#s)">
    <rect x="830" y="78" width="150" height="190" rx="32" fill="#111827"/>
    <rect x="842" y="94" width="126" height="158" rx="22" fill="white"/>
    <text x="866" y="134" fill="#111827" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="900">iPhone</text>
    <rect x="862" y="156" width="86" height="30" rx="10" fill="#E0F2FE"/>
    <text x="879" y="177" fill="#0369A1" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="900">Pair</text>
    <rect x="862" y="196" width="86" height="30" rx="10" fill="#ECFDF5"/>
    <text x="879" y="217" fill="#047857" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="900">Sync</text>
  </g>
