<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">QuickDesk product overview</title>
  <desc id="desc">A Mac agent connected to an iPhone and Apple Watch with approval cards and developer workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="20" x2="1120" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.48" stop-color="#12303A"/>
      <stop offset="1" stop-color="#141827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#20D7C1"/>
      <stop offset="1" stop-color="#7077FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="42" fill="url(#bg)"/>
  <circle cx="1008" cy="118" r="156" fill="#20D7C1" opacity="0.12" filter="url(#glow)"/>
  <circle cx="220" cy="514" r="164" fill="#7077FF" opacity="0.14" filter="url(#glow)"/>
  <path d="M168 154C265 73 392 62 493 120C594 178 630 286 742 288C854 290 921 183 1034 219C1110 244 1144 318 1134 389" stroke="white" stroke-opacity="0.08" stroke-width="2"/>

  <g transform="translate(78 82)">
    <rect x="0" y="0" width="454" height="330" rx="30" fill="url(#card)" stroke="white" stroke-opacity="0.14"/>
    <circle cx="52" cy="58" r="22" fill="url(#accent)"/>
    <path d="M50 44L38 64H52L47 78L68 54H54L60 44H50Z" fill="white"/>
    <text x="92" y="52" fill="white" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="800">QuickDesk</text>
    <text x="92" y="82" fill="#B7C4D6" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16">Local-first command center for Mac</text>
    <rect x="34" y="126" width="386" height="62" rx="18" fill="#07111F" fill-opacity="0.72" stroke="#20D7C1" stroke-opacity="0.42"/>
    <circle cx="66" cy="157" r="8" fill="#20D7C1"/>
    <text x="88" y="152" fill="white" font-family="SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700">Agent online</text>
    <text x="88" y="174" fill="#8DA5B8" font-family="SFMono-Regular, Menlo, monospace" font-size="12">http://127.0.0.1:7420/local</text>
    <rect x="34" y="210" width="176" height="68" rx="18" fill="#FFFFFF" fill-opacity="0.08"/>
    <text x="56" y="240" fill="#20D7C1" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800">10+</text>
    <text x="56" y="263" fill="#B7C4D6" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14">Dev workflows</text>
    <rect x="228" y="210" width="192" height="68" rx="18" fill="#FFFFFF" fill-opacity="0.08"/>
    <text x="250" y="240" fill="#AEB5FF" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800">APNs</text>
    <text x="250" y="263" fill="#B7C4D6" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14">Push ready</text>
  </g>

  <g transform="translate(610 74)" filter="url(#shadow)">
    <rect x="0" y="0" width="254" height="486" rx="48" fill="#0B1220" stroke="#303B50" stroke-width="8"/>
    <rect x="16" y="18" width="222" height="450" rx="36" fill="#F4F7FB"/>
    <rect x="86" y="30" width="82" height="12" rx="6" fill="#0B1220" opacity="0.2"/>
    <text x="36" y="80" fill="#0B1220" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="900">QuickDesk</text>
    <rect x="32" y="108" width="190" height="86" rx="22" fill="#0B1220"/>
    <circle cx="62" cy="142" r="14" fill="url(#accent)"/>
    <text x="86" y="138" fill="white" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="800">Mac online</text>
    <text x="86" y="160" fill="#93A4B8" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11">h-MacBook.local</text>
    <rect x="32" y="216" width="190" height="48" rx="16" fill="#EAF4FF"/>
    <text x="52" y="247" fill="#266EF1" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="800">Open Codex</text>
    <rect x="32" y="276" width="190" height="48" rx="16" fill="#EEF9F7"/>
    <text x="52" y="307" fill="#06917F" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="800">Run Agent Tests</text>
    <rect x="32" y="336" width="190" height="78" rx="18" fill="#FFFFFF" stroke="#DCE4EE"/>
    <text x="52" y="366" fill="#0B1220" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="900">Approval waiting</text>
    <text x="52" y="389" fill="#718096" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">Codex wants permission</text>
  </g>

  <g transform="translate(875 206)" filter="url(#shadow)">
    <rect x="0" y="0" width="194" height="234" rx="54" fill="#0B1220" stroke="#303B50" stroke-width="8"/>
    <rect x="18" y="18" width="158" height="198" rx="40" fill="#0F172A"/>
    <text x="46" y="64" fill="white" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="900">Approve?</text>
    <text x="46" y="92" fill="#93A4B8" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">Codex request</text>
    <rect x="38" y="118" width="118" height="38" rx="18" fill="url(#accent)"/>
    <text x="78" y="142" fill="white" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="900">Allow</text>
    <text x="47" y="180" fill="#20D7C1" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="800">Double Tap to allow</text>
  </g>

  <path d="M532 244C566 244 576 244 610 244" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M864 314C880 314 858 314 875 314" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <text x="76" y="538" fill="#DDE8F7" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="36" font-weight="900">Approve developer prompts from your wrist.</text>
  <text x="78" y="574" fill="#9EB0C6" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">Claude Code, Codex, tasks, diagnostics, Tailscale, and push-ready approvals.</text>
</svg>
