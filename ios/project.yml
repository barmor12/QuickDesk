# XcodeGen spec. Generate the Xcode project with:  xcodegen generate
# (Install XcodeGen via `brew install xcodegen`.)
name: QuickDesk
options:
  bundleIdPrefix: com.quickdesk
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: NO
    # Automatic signing: open in Xcode and pick your Apple ID team (free works).
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "MDCAVQG3H6"

targets:
  # ---------------- iPhone app ----------------
  QuickDesk:
    type: application
    platform: iOS
    sources:
      - path: QuickDesk
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barmor.quickdesk
        INFOPLIST_FILE: QuickDesk/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: QuickDeskWatch
        embed: true

  # ---------------- Apple Watch app ----------------
  QuickDeskWatch:
    type: application
    platform: watchOS
    sources:
      - path: QuickDeskWatch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barmor.quickdesk.watchkitapp
        INFOPLIST_FILE: QuickDeskWatch/Info.plist
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        TARGETED_DEVICE_FAMILY: "4"
